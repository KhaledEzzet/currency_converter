name: currency_converter
description: A new flutter project

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9

  # Localization
  flutter_localizations:
    sdk: flutter

  # Networking
  dio: ^5.9.2
  dio_smart_retry: ^7.0.1
  pretty_dio_logger: ^1.4.0

  # Routing
  go_router: ^17.1.0

  # State Management
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^11.0.0

  # Charts
  syncfusion_flutter_charts: ^33.1.46

  # Storage
  path_provider: ^2.1.4

  # Utility
  uuid: ^4.5.3
  intl: ^0.20.2
  logger: ^2.7.0
  envied: ^1.3.4
  package_info_plus: ^9.0.1
  device_info_plus: ^12.4.0
  cached_network_image: ^3.3.1

  # Dependency Injection
  get_it: ^9.2.1
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0
  skeletonizer: ^2.1.3
  feedback: ^3.2.0
  flutter_email_sender: ^8.0.0
  url_launcher: ^6.3.2
  web: ^1.1.1
  showcaseview: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Linter
  very_good_analysis: ^10.2.0

  # Code Generation
  build_runner: ^2.13.1
  envied_generator: ^1.3.4

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
